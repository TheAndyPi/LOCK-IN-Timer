<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOCK IN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'danger-red': 'var(--color-accent)',
              'void-black': 'var(--color-bg)',
              'dim-gray': 'var(--color-dim)',
              'text-main': 'var(--color-text)',
              'on-accent': 'var(--color-accent-text)',
            },
            fontFamily: {
              mono: ['var(--font-main)', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
            },
            animation: {
              'pulse-fast': 'pulse 0.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'strobe': 'strobe 0.15s steps(2, start) infinite',
              'flash-panic': 'flash-panic 0.5s ease-in-out infinite',
            },
            keyframes: {
              strobe: {
                '0%': { backgroundColor: 'var(--color-accent)' },
                '100%': { backgroundColor: '#ffffff' },
              },
              'flash-panic': {
                '0%, 100%': { backgroundColor: 'var(--color-accent)', opacity: '0.8' },
                '50%': { backgroundColor: 'var(--color-bg)', opacity: '1' },
              }
            }
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {

  }
}
</script>

    --color-accent: #ff0000;

    --color-accent-text: #ffffff;
    --font-main: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace';
